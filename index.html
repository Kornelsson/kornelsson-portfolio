<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kornelsson Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400;1,500&family=Karla:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper:    #F7F4EE;
      --paper-2:  #F0EBE2;
      --ink:      #2B2622;
      --ink-soft: #5C544C;
      --muted:    #97907F;
      --line:     #E2DBCD;
      --rose:     #C98A8A;
      --indigo:   #7A8BB5;
      --sage:     #9AAE8F;
      --ochre:    #D4A95C;
      --plum:     #8A7595;
      --radius:   14px;
      --radius-organic: 58% 42% 47% 53% / 52% 48% 52% 48%;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Karla', sans-serif;
      font-size: 14.5px;
      font-weight: 400;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* ── WATERCOLOR WASHES (signature) ── */
    body::before, body::after {
      content: '';
      position: fixed;
      z-index: -1;
      border-radius: var(--radius-organic);
      filter: blur(90px);
      opacity: 0.5;
      pointer-events: none;
    }
    body::before {
      width: 55vw; height: 55vw;
      top: -18vw; right: -14vw;
      background: radial-gradient(circle at 30% 40%, var(--rose) 0%, transparent 65%),
                  radial-gradient(circle at 70% 70%, var(--ochre) 0%, transparent 60%);
      animation: drift1 26s ease-in-out infinite alternate;
    }
    body::after {
      width: 60vw; height: 60vw;
      bottom: -25vw; left: -18vw;
      background: radial-gradient(circle at 60% 30%, var(--indigo) 0%, transparent 60%),
                  radial-gradient(circle at 30% 75%, var(--sage) 0%, transparent 62%);
      animation: drift2 32s ease-in-out infinite alternate;
    }
    @keyframes drift1 {
      from { transform: translate(0,0) rotate(0deg); }
      to   { transform: translate(-5vw, 4vw) rotate(8deg); }
    }
    @keyframes drift2 {
      from { transform: translate(0,0) rotate(0deg); }
      to   { transform: translate(4vw, -4vw) rotate(-6deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      body::before, body::after { animation: none; }
      * { transition: none !important; }
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(247, 244, 238, 0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 64px;
    }

    .logo {
      font-family: 'Fraunces', serif;
      font-size: 24px;
      font-weight: 500;
      font-style: italic;
      letter-spacing: 0.01em;
      color: var(--ink);
      text-decoration: none;
    }
    .logo span {
      font-style: normal;
      background: linear-gradient(120deg, var(--rose), var(--indigo));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #authBtn {
      background: var(--ink);
      border: none;
      color: var(--paper);
      font-family: 'Karla', sans-serif;
      font-size: 12.5px;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 9px 20px;
      cursor: pointer;
      border-radius: 999px;
      transition: opacity 0.2s, transform 0.2s;
    }
    #authBtn:hover { opacity: 0.85; transform: translateY(-1px); }
    #authBtn:focus-visible { outline: 2px solid var(--indigo); outline-offset: 2px; }

    #userEmail {
      font-size: 12px;
      color: var(--muted);
      display: none;
    }

    /* ── UPLOAD BAR (admin only) ── */
    #uploadBar {
      display: none;
      background: rgba(240, 235, 226, 0.7);
      border-bottom: 1px solid var(--line);
      padding: 16px 32px;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    #dropZone {
      flex: 1;
      min-width: 220px;
      border: 1.5px dashed var(--muted);
      border-radius: var(--radius);
      padding: 14px 20px;
      color: var(--ink-soft);
      font-size: 13px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      background: rgba(255,255,255,0.4);
    }
    #dropZone:hover, #dropZone.dragover {
      border-color: var(--indigo);
      background: rgba(122, 139, 181, 0.08);
    }
    #dropZone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    #uploadBtn {
      background: linear-gradient(120deg, var(--rose), var(--plum));
      color: #fff;
      border: none;
      font-family: 'Karla', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 11px 26px;
      cursor: pointer;
      border-radius: 999px;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
    }
    #uploadBtn:hover { opacity: 0.88; transform: translateY(-1px); }
    #uploadBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    #uploadStatus {
      font-size: 12px;
      color: var(--ink-soft);
    }

    #recompressBtn {
      background: rgba(255,255,255,0.5) !important;
      border: 1px solid var(--line) !important;
      color: var(--ink-soft) !important;
      border-radius: 999px !important;
    }
    #recompressBtn:hover { border-color: var(--sage) !important; color: var(--ink) !important; }
    #recompressStatus { color: var(--ink-soft) !important; }

    /* ── MAIN GRID ── */
    main {
      padding: 44px 32px;
    }

    @media (max-width: 720px) { main { padding: 24px 16px; } header { padding: 0 16px; } #uploadBar { padding: 12px 16px; } }

    #emptyState {
      text-align: center;
      padding: 110px 20px;
      color: var(--muted);
    }
    #emptyState .big {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 56px;
      font-weight: 300;
      color: var(--line);
      line-height: 1;
      margin-bottom: 16px;
    }

    #grid {
      columns: auto;
      column-width: 380px;
      column-gap: 14px;
    }

    @media (max-width: 720px)  { #grid { column-width: 160px; } }
    @media (max-width: 420px)  { #grid { column-width: 100%; } }

    .grid-item {
      break-inside: avoid;
      margin-bottom: 14px;
      position: relative;
      cursor: pointer;
      border-radius: var(--radius);
      overflow: hidden;
      background: #fff;
      padding: 6px;
      box-shadow: 0 1px 2px rgba(43, 38, 34, 0.06), 0 6px 18px rgba(43, 38, 34, 0.07);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }
    .grid-item:hover {
      box-shadow: 0 2px 4px rgba(43, 38, 34, 0.08), 0 14px 34px rgba(122, 139, 181, 0.22);
      transform: translateY(-3px);
    }
    .grid-item.draggable { cursor: grab; }
    .grid-item.draggable:active { cursor: grabbing; }
    .grid-item.dragging {
      opacity: 0.45;
      box-shadow: 0 0 0 2px var(--indigo);
    }
    .grid-item.drag-over {
      box-shadow: 0 0 0 2px var(--rose);
    }

    .grid-item img {
      width: 100%;
      display: block;
      object-fit: cover;
      border-radius: calc(var(--radius) - 5px);
      transition: filter 0.5s ease, opacity 0.5s ease;
      filter: blur(8px);
      opacity: 0.7;
    }
    .grid-item img.loaded {
      filter: blur(0);
      opacity: 1;
    }

    .grid-item .overlay {
      position: absolute;
      inset: 6px;
      border-radius: calc(var(--radius) - 5px);
      background: linear-gradient(to top, rgba(43,38,34,0.55) 0%, transparent 45%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: flex-end;
      padding: 12px;
    }
    .grid-item:hover .overlay { opacity: 1; }

    .overlay-actions {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }

    .btn-icon {
      background: rgba(247, 244, 238, 0.85);
      border: none;
      color: var(--ink);
      border-radius: 999px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s, transform 0.2s;
      backdrop-filter: blur(4px);
    }
    .btn-icon:hover { background: var(--paper); transform: scale(1.08); }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(43, 38, 34, 0.93);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 0 90px rgba(0,0,0,0.6);
    }
    #lightboxClose {
      position: absolute;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      color: rgba(247,244,238,0.6);
      font-size: 30px;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }
    #lightboxClose:hover { color: var(--paper); }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(247,244,238,0.1);
      border: 1px solid rgba(247,244,238,0.25);
      color: var(--paper);
      font-size: 22px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      backdrop-filter: blur(4px);
    }
    .lightbox-nav:hover { background: var(--paper); border-color: var(--paper); color: var(--ink); }
    #lightboxPrev { left: 20px; }
    #lightboxNext { right: 20px; }

    @media (max-width: 600px) {
      #lightboxPrev { left: 8px; }
      #lightboxNext { right: 8px; }
    }

    /* ── SWIPE HINT ── */
    #swipeHint {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(247,244,238,0.4);
      letter-spacing: 0.08em;
      pointer-events: none;
    }
    @media (hover: hover) { #swipeHint { display: none; } }

    /* ── LOGIN MODAL ── */
    #loginModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(43, 38, 34, 0.45);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #loginModal.open { display: flex; }

    .modal-box {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 42px;
      width: 100%;
      max-width: 370px;
      box-shadow: 0 24px 70px rgba(43,38,34,0.25);
    }
    .modal-box h2 {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 28px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--ink);
    }
    .modal-box p { font-size: 12.5px; color: var(--muted); margin-bottom: 28px; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; font-weight: 600; }
    .field input {
      width: 100%;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--ink);
      font-family: 'Karla', sans-serif;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus { border-color: var(--indigo); box-shadow: 0 0 0 3px rgba(122,139,181,0.15); }

    #loginSubmit {
      width: 100%;
      background: var(--ink);
      border: none;
      color: var(--paper);
      font-family: 'Karla', sans-serif;
      font-size: 13.5px;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 13px;
      border-radius: 999px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    #loginSubmit:hover { opacity: 0.85; }

    #loginError { color: #B2554F; font-size: 12px; margin-top: 10px; min-height: 18px; }

    #loginClose {
      position: absolute;
      top: 14px;
      right: 18px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 22px;
      cursor: pointer;
    }

    /* ── PROGRESS BAR ── */
    #progressWrap {
      width: 100%;
      background: var(--line);
      border-radius: 3px;
      height: 4px;
      display: none;
      margin-top: 6px;
      overflow: hidden;
    }
    #progressBar {
      height: 4px;
      background: linear-gradient(90deg, var(--rose), var(--indigo), var(--sage));
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s;
    }

    /* ── DRAG HINT ── */
    #dragHint {
      display: none;
      font-size: 11.5px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 18px;
      letter-spacing: 0.06em;
    }

    /* ── STORAGE PANEL ── */
    #storagePanel {
      display: none;
      background: rgba(240, 235, 226, 0.7);
      border-top: 1px solid var(--line);
      padding: 22px 32px;
      gap: 32px;
      align-items: center;
      flex-wrap: wrap;
    }

    .storage-bar-wrap {
      flex: 1;
      min-width: 200px;
    }

    .storage-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .storage-label span:last-child { color: var(--ink); }

    .storage-track {
      height: 5px;
      background: var(--line);
      border-radius: 3px;
      overflow: hidden;
    }
    .storage-fill {
      height: 5px;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--sage), var(--indigo));
      transition: width 0.6s ease;
      width: 0%;
    }
    .storage-fill.warn  { background: linear-gradient(90deg, var(--ochre), var(--rose)); }
    .storage-fill.danger{ background: #B2554F; }

    .storage-stats {
      display: flex;
      gap: 24px;
      flex-shrink: 0;
    }

    .stat-box {
      text-align: center;
    }
    .stat-box .val {
      font-family: 'Fraunces', serif;
      font-size: 27px;
      font-weight: 500;
      color: var(--ink);
      line-height: 1;
    }
    .stat-box .lbl {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
      margin-top: 5px;
    }

    .storage-console-link {
      font-size: 11.5px;
      color: var(--ink-soft);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 16px;
      white-space: nowrap;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      flex-shrink: 0;
      background: rgba(255,255,255,0.5);
    }
    .storage-console-link:hover { border-color: var(--indigo); color: var(--ink); }

    @media (max-width: 720px) {
      #storagePanel { padding: 16px; gap: 16px; }
    }
  </style>
</head>
<body>



<!-- HEADER -->
<header>
  <a href="#" class="logo" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;">Kornelsson<span>.</span></a>
  <div class="header-right">
    <span id="userEmail"></span>
    <button id="authBtn">Prihlásiť sa</button>
  </div>
</header>

<!-- UPLOAD BAR (admin only) -->
<div id="uploadBar">
  <div id="dropZone">
    Pretiahnite obrázky sem alebo kliknite pre výber
    <input type="file" id="fileInput" accept="image/*" multiple />
  </div>
  <div>
    <button id="uploadBtn" disabled>Nahrať</button>
    <div id="progressWrap"><div id="progressBar"></div></div>

  <button id="recompressBtn" style="background:transparent;border:1px solid var(--border);color:var(--muted);font-family:inherit;font-size:12px;padding:10px 18px;border-radius:var(--radius);cursor:pointer;white-space:nowrap;">
    ⚙ Skomprimovať existujúce
  </button>
  <div id="recompressStatus" style="font-size:12px;color:var(--muted);"></div>
</div>

<!-- MAIN -->
<main>
  <div id="dragHint">↔ Presuňte obrázky pre zmenu poradia</div>
  <div id="emptyState">
    <div class="big">∅</div>
    <div>Zatiaľ žiadne obrázky</div>
  </div>
  <div id="grid"></div>
</main>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lightboxClose">×</button>
  <button class="lightbox-nav" id="lightboxPrev">&#8249;</button>
  <img id="lightboxImg" src="" alt="" />
  <button class="lightbox-nav" id="lightboxNext">&#8250;</button>
  <div id="swipeHint">← swipe →</div>
</div>

<!-- LOGIN MODAL -->
<div id="loginModal">
  <div class="modal-box" style="position:relative">
    <button id="loginClose">×</button>
    <h2>Prihlásenie</h2>
    <p>Prístup len pre administrátora</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="vas@email.com" />
    </div>
    <div class="field">
      <label>Heslo</label>
      <input type="password" id="loginPassword" placeholder="••••••••" />
    </div>
    <button id="loginSubmit">Prihlásiť sa</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- STORAGE PANEL (admin only) -->
<div id="storagePanel">
  <div class="storage-stats">
    <div class="stat-box">
      <div class="val" id="statUsed">0 MB</div>
      <div class="lbl">Využité</div>
    </div>
    <div class="stat-box">
      <div class="val" id="statFree">5 GB</div>
      <div class="lbl">Zostatok</div>
    </div>
    <div class="stat-box">
      <div class="val" id="statCount">0</div>
      <div class="lbl">Obrázkov</div>
    </div>
  </div>
  <div class="storage-bar-wrap">
    <div class="storage-label">
      <span>Firebase Storage</span>
      <span id="statPct">0%</span>
    </div>
    <div class="storage-track">
      <div class="storage-fill" id="storageFill"></div>
    </div>
  </div>
  <a class="storage-console-link" href="https://console.firebase.google.com/project/kornelsson-bea69/storage" target="_blank">
    → Presné údaje v konzole
  </a>
  <button id="recalcBtn" class="storage-console-link" style="cursor:pointer;background:transparent;font-family:inherit;">
    ↺ Prepočítať
  </button>
</div>

<!-- FIREBASE SDK -->

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }

    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  // ─────────────────────────────────────────────
  // 🔧 VYPLŇ TIETO ÚDAJE Z FIREBASE KONZOLY
  // ─────────────────────────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyDzwgVupB_pDsoHZiG8JvQLx5QZy-BXdNY",
    authDomain:        "kornelsson-bea69.firebaseapp.com",
    projectId:         "kornelsson-bea69",
    storageBucket:     "kornelsson-bea69.firebasestorage.app",
    messagingSenderId: "129211041007",
    appId:             "1:129211041007:web:5923134219948f8bdbc71a"
  };
  // ─────────────────────────────────────────────

  const app     = initializeApp(firebaseConfig);
  const auth    = getAuth(app);
  const db      = getFirestore(app);
  const storage = getStorage(app);

  // DOM refs
  const grid         = document.getElementById('grid');
  const emptyState   = document.getElementById('emptyState');
  const dragHint     = document.getElementById('dragHint');
  const authBtn      = document.getElementById('authBtn');
  const userEmail    = document.getElementById('userEmail');
  const uploadBar    = document.getElementById('uploadBar');
  const fileInput    = document.getElementById('fileInput');
  const dropZone     = document.getElementById('dropZone');
  const uploadBtn    = document.getElementById('uploadBtn');
  const uploadStatus = document.getElementById('uploadStatus');
  const progressWrap = document.getElementById('progressWrap');
  const progressBar  = document.getElementById('progressBar');
  const loginModal   = document.getElementById('loginModal');
  const loginClose   = document.getElementById('loginClose');
  const loginEmail   = document.getElementById('loginEmail');
  const loginPassword= document.getElementById('loginPassword');
  const loginSubmit  = document.getElementById('loginSubmit');
  const loginError   = document.getElementById('loginError');
  const lightbox     = document.getElementById('lightbox');
  const lightboxImg  = document.getElementById('lightboxImg');
  const lightboxClose= document.getElementById('lightboxClose');
  const lightboxPrev = document.getElementById('lightboxPrev');
  const lightboxNext = document.getElementById('lightboxNext');
  const storagePanel = document.getElementById('storagePanel');
  const statUsed     = document.getElementById('statUsed');
  const statFree     = document.getElementById('statFree');
  const statCount    = document.getElementById('statCount');
  const statPct      = document.getElementById('statPct');
  const storageFill    = document.getElementById('storageFill');
  const recalcBtn      = document.getElementById('recalcBtn');
  const recompressBtn  = document.getElementById('recompressBtn');
  const recompressStatus = document.getElementById('recompressStatus');

  let isAdmin = false;
  let images  = [];   // [{id, url, storagePath, order}]
  let selectedFiles = [];
  let lightboxCurrentIdx = 0;

  // ── AUTH ──
  onAuthStateChanged(auth, user => {
    isAdmin = !!user;
    if (user) {
      authBtn.textContent = 'Odhlásiť sa';
      userEmail.style.display = 'block';
      userEmail.textContent = user.email;
      uploadBar.style.display = 'flex';
      dragHint.style.display = 'block';
      storagePanel.style.display = 'flex';
      updateStorageUI();
    } else {
      authBtn.textContent = 'Prihlásiť sa';
      userEmail.style.display = 'none';
      uploadBar.style.display = 'none';
      dragHint.style.display = 'none';
      storagePanel.style.display = 'none';
    }
    renderGrid();
  });

  authBtn.addEventListener('click', () => {
    if (isAdmin) { signOut(auth); }
    else { loginModal.classList.add('open'); }
  });

  loginClose.addEventListener('click', () => loginModal.classList.remove('open'));
  loginModal.addEventListener('click', e => { if (e.target === loginModal) loginModal.classList.remove('open'); });

  loginSubmit.addEventListener('click', async () => {
    loginError.textContent = '';
    try {
      await signInWithEmailAndPassword(auth, loginEmail.value.trim(), loginPassword.value);
      loginModal.classList.remove('open');
      loginPassword.value = '';
    } catch(e) {
      loginError.textContent = 'Nesprávny email alebo heslo.';
    }
  });

  loginPassword.addEventListener('keydown', e => { if (e.key === 'Enter') loginSubmit.click(); });

  // ── FILE SELECTION ──
  fileInput.addEventListener('change', () => {
    selectedFiles = Array.from(fileInput.files);
    uploadBtn.disabled = selectedFiles.length === 0;
    uploadStatus.textContent = selectedFiles.length
      ? `${selectedFiles.length} súbor(ov) pripravených`
      : '';
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    selectedFiles = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    uploadBtn.disabled = selectedFiles.length === 0;
    uploadStatus.textContent = selectedFiles.length ? `${selectedFiles.length} súbor(ov) pripravených` : '';
  });

  // ── REKOMPRESIA EXISTUJÚCICH ──
  recompressBtn.addEventListener('click', async () => {
    if (!confirm(`Skomprimovať všetkých ${images.length} obrázkov? Môže to trvať niekoľko minút.`)) return;
    recompressBtn.disabled = true;
    let totalBytes = 0;

    for (let i = 0; i < images.length; i++) {
      const img = images[i];
      recompressStatus.textContent = `Spracovávam ${i + 1} / ${images.length}...`;
      try {
        // Stiahni originál
        const res  = await fetch(img.url);
        const blob = await res.blob();

        // Skomprimuj
        const file       = new File([blob], 'img.jpg', { type: blob.type });
        const compressed = await compressImage(file);

        // Zmaž starý súbor
        try { await deleteObject(ref(storage, img.storagePath)); } catch(_) {}

        // Nahraj nový
        const newPath     = `images/${Date.now()}_compressed.jpg`;
        const storageRef  = ref(storage, newPath);
        const task        = uploadBytesResumable(storageRef, compressed);
        await new Promise((resolve, reject) => task.on('state_changed', null, reject, resolve));
        const newUrl      = await getDownloadURL(ref(storage, newPath));

        // Aktualizuj Firestore
        await updateDoc(doc(db, 'images', img.id), {
          url: newUrl,
          storagePath: newPath,
          size: compressed.size
        });

        totalBytes += compressed.size;
      } catch(err) {
        console.error('Chyba pri obrázku:', img.id, err);
      }
    }

    // Aktualizuj celkové využitie
    await setDoc(doc(db, 'meta', 'storage'), { usedBytes: totalBytes });
    await loadImages();
    renderGrid();
    await updateStorageUI();
    recompressStatus.textContent = '✓ Hotovo!';
    recompressBtn.disabled = false;
    setTimeout(() => { recompressStatus.textContent = ''; }, 3000);
  });

  // ── KOMPRESIA OBRÁZKOV ──
  function compressImage(file, maxWidth = 1920, quality = 0.82) {
    return new Promise((resolve) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        let { width, height } = img;
        if (width > maxWidth) {
          height = Math.round(height * maxWidth / width);
          width = maxWidth;
        }
        const canvas = document.createElement('canvas');
        canvas.width  = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        canvas.toBlob(blob => resolve(blob), 'image/jpeg', quality);
      };
      img.src = url;
    });
  }

  // ── UPLOAD ──
  uploadBtn.addEventListener('click', async () => {
    if (!selectedFiles.length) return;
    uploadBtn.disabled = true;
    progressWrap.style.display = 'block';
    let done = 0;

    for (const file of selectedFiles) {
      uploadStatus.textContent = `Komprimujem ${done + 1}/${selectedFiles.length}...`;
      const compressed = await compressImage(file);
      const fileSize = compressed.size;
      const path = `images/${Date.now()}_${file.name.replace(/\.[^.]+$/, '')}.jpg`;
      const storageRef = ref(storage, path);
      await new Promise((resolve, reject) => {
        const task = uploadBytesResumable(storageRef, compressed);
        task.on('state_changed',
          snap => {
            const pct = (done / selectedFiles.length + snap.bytesTransferred / snap.totalBytes / selectedFiles.length) * 100;
            progressBar.style.width = pct + '%';
            uploadStatus.textContent = `Nahrávam ${done + 1}/${selectedFiles.length}...`;
          },
          reject,
          async () => {
            const url = await getDownloadURL(task.snapshot.ref);
            const maxOrder = images.length ? Math.max(...images.map(i => i.order)) : -1;
            await addDoc(collection(db, 'images'), { url, storagePath: path, order: maxOrder + 1, size: fileSize });
            await addStorageUsed(fileSize);
            done++;
            resolve();
          }
        );
      });
    }

    progressBar.style.width = '100%';
    uploadStatus.textContent = 'Nahraté!';
    selectedFiles = [];
    fileInput.value = '';
    uploadBtn.disabled = false;
    setTimeout(() => { progressWrap.style.display = 'none'; progressBar.style.width = '0'; uploadStatus.textContent = ''; }, 2000);
    await loadImages();
    renderGrid();
    updateStorageUI();
  });

  // ── STORAGE TRACKING ──
  const TOTAL_FREE_BYTES = 5 * 1024 * 1024 * 1024; // 5 GB

  function formatBytes(bytes) {
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
  }

  async function getStorageUsed() {
    try {
      const snap = await getDoc(doc(db, 'meta', 'storage'));
      return snap.exists() ? (snap.data().usedBytes || 0) : 0;
    } catch { return 0; }
  }

  async function addStorageUsed(bytes) {
    const current = await getStorageUsed();
    await setDoc(doc(db, 'meta', 'storage'), { usedBytes: current + bytes });
  }

  async function subtractStorageUsed(bytes) {
    const current = await getStorageUsed();
    await setDoc(doc(db, 'meta', 'storage'), { usedBytes: Math.max(0, current - bytes) });
  }

  async function updateStorageUI() {
    const used = await getStorageUsed();
    const free = Math.max(0, TOTAL_FREE_BYTES - used);
    const pct  = Math.min(100, (used / TOTAL_FREE_BYTES) * 100);
    statUsed.textContent  = formatBytes(used);
    statFree.textContent  = formatBytes(free);
    statCount.textContent = images.length;
    statPct.textContent   = pct.toFixed(2) + '%';
    storageFill.style.width = pct + '%';
    storageFill.className = 'storage-fill' + (pct > 90 ? ' danger' : pct > 70 ? ' warn' : '');
  }

  recalcBtn.addEventListener('click', async () => {
    recalcBtn.textContent = '↺ Počítam...';
    recalcBtn.disabled = true;
    let totalBytes = 0;

    console.log('Počet obrázkov:', images.length);

    for (const img of images) {
      try {
        console.log('Sťahujem:', img.url);
        const res = await fetch(img.url);
        const blob = await res.blob();
        const size = blob.size;
        console.log('Veľkosť:', size, 'bytes');
        if (size > 0) {
          await updateDoc(doc(db, 'images', img.id), { size });
          totalBytes += size;
        }
      } catch(err) {
        console.error('Chyba pri obrázku:', img.url, err);
      }
    }

    console.log('Celkom bytes:', totalBytes);
    await setDoc(doc(db, 'meta', 'storage'), { usedBytes: totalBytes });
    await updateStorageUI();
    recalcBtn.textContent = '↺ Prepočítať';
    recalcBtn.disabled = false;
  });

  // ── LOAD IMAGES ──
  async function loadImages() {
    const q = query(collection(db, 'images'), orderBy('order'));
    const snap = await getDocs(q);
    images = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  }

  await loadImages();
  renderGrid();

  // ── RENDER ──
  function renderGrid() {
    grid.innerHTML = '';
    if (!images.length) {
      emptyState.style.display = 'block';
      return;
    }
    emptyState.style.display = 'none';

    images.forEach((img, idx) => {
      const item = document.createElement('div');
      item.className = 'grid-item';
      item.dataset.id = img.id;
      item.dataset.idx = idx;
      item.draggable = isAdmin;
      if (isAdmin) item.classList.add('draggable');

      item.innerHTML = `
        <img src="${img.url}" alt="Kornelsson Portfolio" loading="lazy" />
        <div class="overlay">
          <div class="overlay-actions">
            <button class="btn-icon btn-open" title="Otvoriť">⤢</button>
            ${isAdmin ? `<button class="btn-icon btn-delete" title="Zmazať">✕</button>` : ''}
          </div>
        </div>
      `;

      const imgEl = item.querySelector('img');
      if (imgEl.complete) {
        imgEl.classList.add('loaded');
      } else {
        imgEl.addEventListener('load', () => imgEl.classList.add('loaded'));
      }

      item.addEventListener('click', () => {
        lightboxCurrentIdx = idx;
        lightboxImg.src = img.url;
        lightbox.classList.add('open');
      });

      item.querySelector('.btn-open').addEventListener('click', e => {
        e.stopPropagation();
        lightboxCurrentIdx = idx;
        lightboxImg.src = img.url;
        lightbox.classList.add('open');
      });

      if (isAdmin) {
        item.querySelector('.btn-delete').addEventListener('click', async e => {
          e.stopPropagation();
          if (!confirm('Zmazať tento obrázok?')) return;
          await deleteDoc(doc(db, 'images', img.id));
          if (img.size) await subtractStorageUsed(img.size);
          try { await deleteObject(ref(storage, img.storagePath)); } catch(_) {}
          await loadImages();
          renderGrid();
          updateStorageUI();
        });

        // drag & drop reorder
        item.addEventListener('dragstart', onDragStart);
        item.addEventListener('dragover',  onDragOver);
        item.addEventListener('drop',      onDrop);
        item.addEventListener('dragend',   onDragEnd);
      }

      grid.appendChild(item);
    });
  }

  // ── DRAG & DROP REORDER ──
  let dragSrcIdx = null;

  function onDragStart(e) {
    dragSrcIdx = +e.currentTarget.dataset.idx;
    e.currentTarget.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }

  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.grid-item').forEach(el => el.classList.remove('drag-over'));
    e.currentTarget.classList.add('drag-over');
  }

  async function onDrop(e) {
    e.preventDefault();
    const destIdx = +e.currentTarget.dataset.idx;
    if (dragSrcIdx === null || dragSrcIdx === destIdx) return;

    const moved = images.splice(dragSrcIdx, 1)[0];
    images.splice(destIdx, 0, moved);

    // Save new order to Firestore
    await Promise.all(images.map((img, i) =>
      updateDoc(doc(db, 'images', img.id), { order: i })
    ));

    renderGrid();
  }

  function onDragEnd(e) {
    e.currentTarget.classList.remove('dragging');
    document.querySelectorAll('.grid-item').forEach(el => el.classList.remove('drag-over'));
    dragSrcIdx = null;
  }

  // ── LIGHTBOX ──
  const preloadCache = {};

  function preloadAdjacent(idx) {
    const next = (idx + 1) % images.length;
    const prev = (idx - 1 + images.length) % images.length;
    [next, prev].forEach(i => {
      if (!preloadCache[images[i].url]) {
        const img = new Image();
        img.src = images[i].url;
        preloadCache[images[i].url] = img;
      }
    });
  }

  function showLightboxImage(idx) {
    lightboxCurrentIdx = idx;
    lightboxImg.src = images[idx].url;
    preloadAdjacent(idx);
  }

  function openLightbox(idx) {
    showLightboxImage(idx);
    lightbox.classList.add('open');
  }

  lightboxClose.addEventListener('click', () => lightbox.classList.remove('open'));
  lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('open'); });

  lightboxPrev.addEventListener('click', e => {
    e.stopPropagation();
    showLightboxImage((lightboxCurrentIdx - 1 + images.length) % images.length);
  });

  lightboxNext.addEventListener('click', e => {
    e.stopPropagation();
    showLightboxImage((lightboxCurrentIdx + 1) % images.length);
  });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape')     lightbox.classList.remove('open');
    if (e.key === 'ArrowRight') showLightboxImage((lightboxCurrentIdx + 1) % images.length);
    if (e.key === 'ArrowLeft')  showLightboxImage((lightboxCurrentIdx - 1 + images.length) % images.length);
  });

  // ── SWIPE GESTURE ──
  let touchStartX = 0;
  let touchEndX   = 0;

  lightbox.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
  }, { passive: true });

  lightbox.addEventListener('touchend', e => {
    touchEndX = e.changedTouches[0].screenX;
    const diff = touchStartX - touchEndX;
    if (Math.abs(diff) < 50) return;
    if (diff > 0) {
      showLightboxImage((lightboxCurrentIdx + 1) % images.length);
    } else {
      showLightboxImage((lightboxCurrentIdx - 1 + images.length) % images.length);
    }
  }, { passive: true });
</script>
</body>
</html>
